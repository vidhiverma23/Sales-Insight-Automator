# ===========================================
# Sales Insight Automator — CI/CD Pipeline
# Triggers on PRs to main branch
# ===========================================

name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # --- Backend: Lint & Validate ---
  backend:
    name: Backend — Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Validate imports
        run: python -c "from app.main import app; print('✅ App imports OK')"

  # --- Frontend: Lint & Build ---
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com

  # --- Docker: Validate Builds ---
  docker:
    name: Docker — Validate Builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t sia-backend ./backend

      - name: Build Frontend Image
        run: docker build -t sia-frontend ./frontend
